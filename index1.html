<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Alibaba Style Shop | Order to Telegram</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Hind+Siliguri:wght@400;600&display=swap');
        body { font-family: 'Hind Siliguri', sans-serif; }
    </style>
</head>
<body class="bg-gray-50">

    <header class="bg-white border-b sticky top-0 z-50">
        <div class="container mx-auto px-4 py-3 flex items-center justify-between">
            <div class="text-3xl font-extrabold text-orange-500 tracking-tighter">ALIBABA <span class="text-gray-800 text-lg font-normal italic">Clone</span></div>
            <div class="hidden md:flex flex-1 max-w-xl mx-8">
                <input type="text" placeholder="পণ্য খুঁজুন..." class="w-full border-2 border-orange-500 rounded-l-lg px-4 py-2 focus:outline-none">
                <button class="bg-orange-500 text-white px-6 rounded-r-lg hover:bg-orange-600 transition"><i class="fas fa-search"></i></button>
            </div>
            <div class="flex items-center space-x-5 text-gray-700">
                <div class="text-center cursor-pointer"><i class="fas fa-shopping-cart text-xl"></i><p class="text-xs">কার্ট</p></div>
                <div class="text-center cursor-pointer"><i class="fas fa-user text-xl"></i><p class="text-xs">অ্যাকাউন্ট</p></div>
            </div>
        </div>
    </header>

    <main class="container mx-auto px-4 py-10">
        <h2 class="text-2xl font-bold mb-8 border-l-4 border-orange-500 pl-3">সেরা অফারসমূহ</h2>
        
        <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-8">
            
            <div class="bg-white rounded-xl shadow-sm hover:shadow-lg transition-all duration-300 p-4 border border-gray-100">
                <img src="https://images.unsplash.com/photo-1523275335684-37898b6baf30?auto=format&fit=crop&w=400&q=80" alt="Watch" class="w-full h-48 object-cover rounded-lg mb-4">
                <h3 id="p1-name" class="font-semibold text-gray-800 text-lg mb-1">স্মার্ট ওয়াচ প্রো (লিমিটেড এডিশন)</h3>
                <p class="text-orange-600 font-bold text-xl mb-4">৳ ১,৫০০</p>
                <button onclick="openCheckout('স্মার্ট ওয়াচ প্রো', '৳ ১,৫০০')" class="w-full bg-orange-500 text-white py-2.5 rounded-lg font-semibold hover:bg-orange-600 transition">অর্ডার করুন</button>
            </div>

            <div class="bg-white rounded-xl shadow-sm hover:shadow-lg transition-all duration-300 p-4 border border-gray-100">
                <img src="https://images.unsplash.com/photo-1505740420928-5e560c06d30e?auto=format&fit=crop&w=400&q=80" alt="Headphone" class="w-full h-48 object-cover rounded-lg mb-4">
                <h3 id="p2-name" class="font-semibold text-gray-800 text-lg mb-1">প্রিমিয়াম ব্লুটুথ হেডফোন</h3>
                <p class="text-orange-600 font-bold text-xl mb-4">৳ ২,২০০</p>
                <button onclick="openCheckout('প্রিমিয়াম হেডফোন', '৳ ২,২০০')" class="w-full bg-orange-500 text-white py-2.5 rounded-lg font-semibold hover:bg-orange-600 transition">অর্ডার করুন</button>
            </div>

        </div>
    </main>

    <div id="modal" class="fixed inset-0 bg-black/60 hidden flex items-center justify-center p-4 z-[100] backdrop-blur-sm">
        <div class="bg-white rounded-2xl w-full max-w-md p-8 shadow-2xl">
            <h2 class="text-2xl font-bold text-gray-800 mb-2">শিপিং তথ্য</h2>
            <p class="text-sm text-gray-500 mb-6">অর্ডারটি সম্পন্ন করতে আপনার তথ্য দিন।</p>
            
            <div class="space-y-4">
                <input type="text" id="cust-name" placeholder="আপনার নাম" class="w-full border rounded-lg p-3 focus:ring-2 focus:ring-orange-500 outline-none">
                <input type="text" id="cust-phone" placeholder="মোবাইল নম্বর" class="w-full border rounded-lg p-3 focus:ring-2 focus:ring-orange-500 outline-none">
                <textarea id="cust-address" placeholder="ঠিকানা" class="w-full border rounded-lg p-3 focus:ring-2 focus:ring-orange-500 outline-none"></textarea>
                
                <div class="bg-gray-50 p-4 rounded-lg border border-dashed border-gray-300">
                    <p class="text-xs font-bold text-gray-400 mb-2 uppercase">পেমেন্ট মেথড</p>
                    <label class="flex items-center space-x-3 cursor-pointer">
                        <input type="radio" checked class="accent-orange-500 w-4 h-4">
                        <span class="text-gray-700">বিকাশ/নগদ (অর্ডার পর মেসেজ আসবে)</span>
                    </label>
                </div>
            </div>

            <button onclick="submitOrder()" id="submitBtn" class="w-full mt-6 bg-orange-500 text-white py-3 rounded-lg font-bold shadow-lg shadow-orange-200 hover:bg-orange-600 transition">অর্ডার কনফার্ম করুন</button>
            <button onclick="closeCheckout()" class="w-full mt-3 text-gray-400 text-sm">পরে কিনবো</button>
        </div>
    </div>

    <script>
        // আপনার দেওয়া সঠিক তথ্য এখানে দেওয়া হলো
        const BOT_TOKEN = '7957986649:AAGCcJ5R6g6PMHEgWXFqLRn2SrpElZvUtnE';
        const CHAT_ID = '8516934257';

        let currentProduct = '';
        let currentPrice = '';

        function openCheckout(name, price) {
            currentProduct = name;
            currentPrice = price;
            document.getElementById('modal').classList.remove('hidden');
        }

        function closeCheckout() {
            document.getElementById('modal').classList.add('hidden');
        }

        async function submitOrder() {
            const name = document.getElementById('cust-name').value;
            const phone = document.getElementById('cust-phone').value;
            const address = document.getElementById('cust-address').value;
            const btn = document.getElementById('submitBtn');

            if(!name || !phone || !address) {
                alert('অনুগ্রহ করে সব তথ্য দিন!');
                return;
            }

            btn.disabled = true;
            btn.innerHTML = "প্রসেসিং হচ্ছে...";

            const message = `
🔔 **নতুন অর্ডার এসেছে!**
━━━━━━━━━━━━━━━━━━
🛍️ **পণ্য:** ${currentProduct}
💰 **মূল্য:** ${currentPrice}

👤 **কাস্টমার তথ্য:**
━━━━━━━━━━━━━━━━━━
📝 **নাম:** ${name}
📞 **ফোন:** ${phone}
📍 **ঠিকানা:** ${address}
━━━━━━━━━━━━━━━━━━
✅ *অর্ডারটি দ্রুত প্রসেস করুন!*
            `;

            const url = `https://api.telegram.org/bot${BOT_TOKEN}/sendMessage`;

            try {
                const response = await fetch(url, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        chat_id: CHAT_ID,
                        text: message,
                        parse_mode: 'Markdown'
                    })
                });

                if (response.ok) {
                    alert('আপনার অর্ডারটি সফলভাবে সাবমিট হয়েছে! আমরা শীঘ্রই যোগাযোগ করবো।');
                    location.reload(); // পেজটি রিলোড হবে
                } else {
                    alert('সমস্যা হয়েছে। আবার চেষ্টা করুন।');
                    btn.disabled = false;
                    btn.innerHTML = "অর্ডার কনফার্ম করুন";
                }
            } catch (error) {
                alert('ইন্টারনেট কানেকশন চেক করুন।');
                btn.disabled = false;
                btn.innerHTML = "অর্ডার কনফার্ম করুন";
            }
        }
    </script>
</body>
</html>
